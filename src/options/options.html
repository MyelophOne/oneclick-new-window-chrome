<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title data-i18n="optionsTitle">OneClick New Window Settings</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
				max-width: 400px;
				margin: 0 auto;
			}
			h1 {
				color: #333;
				border-bottom: 2px solid #eee;
				padding-bottom: 10px;
			}
			.option {
				margin: 20px 0;
				padding: 15px;
				border: 1px solid #ddd;
				border-radius: 8px;
				background: #f9f9f9;
			}
			label {
				display: block;
				margin-bottom: 8px;
				font-weight: bold;
			}
			select {
				width: 100%;
				padding: 8px;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-size: 14px;
			}
			.save-btn {
				background: #4caf50;
				color: white;
				border: none;
				padding: 10px 20px;
				border-radius: 4px;
				cursor: pointer;
				font-size: 16px;
			}
			.save-btn:hover {
				background: #45a049;
			}
			.status {
				margin-top: 10px;
				padding: 10px;
				border-radius: 4px;
				display: none;
			}
			.success {
				background: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
			.error {
				background: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
		</style>
	</head>
	<body>
		<h1 data-i18n="optionsTitle">OneClick New Window Settings</h1>

		<div class="option">
			<label for="theme" data-i18n="optionsThemeLabel">Icon Theme:</label>
			<select id="theme">
				<option value="light" data-i18n="optionsThemeLight">
					Light theme icon
				</option>
				<option value="dark" data-i18n="optionsThemeDark">
					Dark theme icon
				</option>
			</select>
			<p
				style="font-size: 12px; color: #666; margin-top: 5px"
				data-i18n="optionsThemeDescription"
			>
				Choose which icon to display for the extension button.
			</p>
		</div>

		<button class="save-btn" id="save" data-i18n="saveButton">
			Save Settings
		</button>

		<div id="status" class="status"></div>

		<div style="position: relative">
			<a
				href="https://www.buymeacoffee.com/aleksivanou?utm_source=oneclick-new-window"
				target="_blank"
				style="display: inline-block; margin-top: 2rem"
			>
				<img
					src="default-yellow.png"
					alt="Buy Me a Coffee"
					style="height: 40px !important; width: auto !important"
				/>
			</a>
		</div>

		<script src="options.js"></script>
	</body>
</html>
